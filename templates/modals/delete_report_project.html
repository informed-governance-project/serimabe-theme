{% load django_bootstrap5 %}
{% load i18n %}
{% block content %}
  <div class="modal-content">
    <div class="modal-header bg-primary text-white px-4 small">
      <h5 class="modal-title" id="delete_report_project_label">
        {% translate "Confirm Deletion of Project" %}
      </h5>
      <button type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="{% translate 'Close' %}">
      </button>
    </div>
    <form id="modal-delete-report-form" method="post" action="#">
      {% csrf_token %}
      <div class="modal-body">
        <div>
          {% translate "Are you sure you want to delete the project?" %}
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
          {% translate "Cancel" %}
        </button>
        <button type="submit" class="btn btn-primary">
          {% translate "Delete" %}
        </button>
      </div>
    </form>
  </div>
{% endblock %}
